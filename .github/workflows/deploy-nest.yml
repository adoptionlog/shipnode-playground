name: Deploy nestjs-api via Shipnode

on:
  push:
    branches:
      - main
    paths:
      - 'nestjs-api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # Monorepo: npm ci must run from the workspace root (single lockfile),
      # scoped to this workspace with -w so we don't pull in the other 2 apps.
      - name: Install dependencies
        run: npm ci --workspace=nestjs-api

      - name: Build
        run: npm run build
        working-directory: nestjs-api

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SHIPNODE_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SHIPNODE_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      # shipnode is published as the scoped package @devalade/shipnode —
      # `npm install -g shipnode` (unscoped) 404s, see journal Bug #8.
      # Pinned to the v3 alpha (matching nestjs-api's local devDependency): a
      # bare `npm install -g @devalade/shipnode` resolves to `latest` (2.5.3),
      # which silently ignores shipnode.config.ts's zeroDowntime/blue-green
      # config and runs v2's recreate strategy with v2's remotePath
      # convention instead — breaking deploys since deployTo here is set for
      # v3's appPath semantics.
      - name: Install Shipnode
        run: npm install -g @devalade/shipnode@3.2.0-alpha.5

      # .env is gitignored (holds real credentials) so it doesn't exist on the
      # runner after checkout. shipnode.config.ts reads process.env.DATABASE_URL /
      # REDIS_URL at build time (see journal §14), so it must be recreated here —
      # shipnode's own `ci env-sync` sets these secrets but nothing in the tool
      # consumes them back into a workflow step, see journal §15 annex bug.
      - name: Write .env
        working-directory: nestjs-api
        run: |
          echo "DATABASE_URL=${{ secrets.NEST_DATABASE_URL }}" >> .env
          echo "REDIS_URL=${{ secrets.NEST_REDIS_URL }}" >> .env

      - name: Deploy
        run: shipnode deploy
        working-directory: nestjs-api
